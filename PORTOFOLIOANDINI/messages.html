<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesan Masuk - Portfolio Andini</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="admin.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <div class="sparkles"></div>

    <section class="messages-section">
        <div class="messages-container">
            <div class="logout-container">
                <button id="logoutBtn" class="logout-btn">Logout 🚪</button>
            </div>
            <div class="floral-deco">💌 ✧ 💌</div>
            <h2 class="section-title">Surat-Surat Masuk 📮</h2>
            <p class="messages-subtitle">Terima kasih telah mengirim pesan, berikut daftar pesan yang masuk:</p>
            
            <div class="messages-wrapper">
                <div class="messages-table-container">
                    <table class="messages-table" id="messagesTable">
                        <thead>
                            <tr>
                                <th>No.</th>
                                <th>Pengirim 👤</th>
                                <th>Pesan 💬</th>
                                <th>Tanggal 📅</th>
                                <th>Aksi</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr class="loading-row">
                                <td colspan="5" class="loading-text">⏳ Memuat pesan...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <div class="empty-state" id="emptyState" style="display: none;">
                    <p>😢 Belum ada pesan masuk</p>
                </div>
            </div>
        </div>
    </section>

    <div class="cursor-cat" id="cursorCat">🐾</div>
    
    <footer>
        <p>Dibuat dengan ✨ oleh Andini Aulia Syahrani &copy; 2026</p>
    </footer>

    <script src="script.js"></script>
    <script src="login.js"></script>
    <script src="admin.js"></script>
</body>
</html>
